name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Run Supabase migrations & seeds
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -e
          echo "Running migrations via supabase cli (docker image)..."
          docker run --rm \
            -e SUPABASE_URL="${SUPABASE_URL}" \
            -e SUPABASE_SERVICE_ROLE_KEY="${SUPABASE_SERVICE_ROLE_KEY}" \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/supabase/cli:latest db push --file /workspace/golfking-booking/migrations/001_init.sql || true
          docker run --rm \
            -e SUPABASE_URL="${SUPABASE_URL}" \
            -e SUPABASE_SERVICE_ROLE_KEY="${SUPABASE_SERVICE_ROLE_KEY}" \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/supabase/cli:latest db push --file /workspace/golfking-booking/migrations/002_seed_sample.sql || true
          docker run --rm \
            -e SUPABASE_URL="${SUPABASE_URL}" \
            -e SUPABASE_SERVICE_ROLE_KEY="${SUPABASE_SERVICE_ROLE_KEY}" \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/supabase/cli:latest db push --file /workspace/golfking-booking/migrations/003_rls_policies.sql || true

      - name: Verify tables exist (quick check)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          apt-get update && apt-get install -y postgresql-client
          echo "Checking golf_courses count..."
          psql "$DATABASE_URL" -c "select count(*) from golf_courses;"
